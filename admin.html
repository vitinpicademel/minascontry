<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Minas Country</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #f4f6f9;">

    <header>
        <div class="container header-content">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt="Minas Country"></a>
            </div>
            <nav class="nav-links">
                <a href="index.html">Voltar ao Site</a>
            </nav>
        </div>
    </header>

    <div class="container mt-5 mb-5">
        
        <!-- Login -->
        <div id="login-section" style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: var(--shadow-card);">
            <h2 class="text-center" style="margin-bottom: 20px;">Acesso Restrito</h2>
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="user" placeholder="admin">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="pass" placeholder="1234">
            </div>
            <button id="btn-login" class="btn" style="width: 100%;">Entrar</button>
        </div>

        <!-- Dashboard Admin -->
        <div id="admin-dashboard" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 style="color: var(--color-primary);">Painel de Administração</h1>
                <button id="btn-logout" class="btn btn-outline">Sair</button>
            </div>

            <!-- Formulário Produto -->
            <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: var(--shadow-card); margin-bottom: 30px;">
                <h3 style="margin-bottom: 20px;">Adicionar/Editar Produto</h3>
                <form id="form-produto">
                    <input type="hidden" id="prod-id">
                    
                    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 2; min-width: 250px;">
                            <label>Nome do Produto</label>
                            <input type="text" id="prod-nome" required>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 150px;">
                            <label>Categoria</label>
                            <select id="prod-categoria" required>
                                <option value="gado">Cabrestos Gado</option>
                                <option value="cavalo">Cabrestos Cavalo</option>
                                <option value="selaria">Selaria</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 150px;">
                            <label>Preço (R$)</label>
                            <input type="number" id="prod-preco" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Caminho da Imagem (ex: images/sela.png)</label>
                        <input type="text" id="prod-imagem" required>
                    </div>

                    <div class="form-group">
                        <label>Descrição Completa</label>
                        <textarea id="prod-descricao" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn">Salvar Produto</button>
                    <button type="button" onclick="document.getElementById('form-produto').reset(); document.getElementById('prod-id').value='';" class="btn btn-outline" style="margin-left: 10px;">Cancelar Edição</button>
                </form>
            </div>

            <!-- Tabela de Produtos -->
            <h3 style="margin-bottom: 10px;">Lista de Produtos</h3>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Imagem</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="admin-tbody">
                        <!-- Linhas injetadas via JS -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
