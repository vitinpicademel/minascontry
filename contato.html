<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Minas Country</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt="Minas Country"></a>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="loja.html">Loja</a>
                <a href="contato.html" style="color: var(--color-secondary);">Contato</a>
            </nav>
        </div>
    </header>

    <div class="container mt-5 mb-5" style="display: flex; flex-wrap: wrap; gap: 40px;">
        <div style="flex: 1; min-width: 300px; background: #fff; padding: 40px; border-radius: 8px; box-shadow: var(--shadow-card);">
            <h2 style="margin-bottom: 20px; color: var(--color-primary);">Fale Conosco</h2>
            <form onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso! Entraremos em contato em breve.'); this.reset();">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Assunto</label>
                    <select required>
                        <option value="">Selecione...</option>
                        <option value="duvida">Dúvida sobre produto</option>
                        <option value="orcamento">Orçamento personalizado</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mensagem</label>
                    <textarea rows="5" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Enviar Mensagem</button>
            </form>
        </div>
        
        <div style="flex: 1; min-width: 300px;">
            <h2 style="margin-bottom: 20px; color: var(--color-primary);">Nossos Canais</h2>
            <div style="background: var(--color-primary); color: white; padding: 30px; border-radius: 8px;">
                <h3 style="color: var(--color-secondary); margin-bottom: 15px;">Atendimento Direto</h3>
                <p style="margin-bottom: 10px; font-size: 1.1rem;">📞 WhatsApp: (34) 98875-6121</p>
                <p style="margin-bottom: 20px;">Respondemos em até 2 horas úteis.</p>
                <a href="https://wa.me/5534988756121" target="_blank" class="btn" style="background: #25d366; color: white;">Chamar no WhatsApp</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <img src="images/logo.png" alt="Logo" style="height: 50px; margin-bottom: 20px; filter: brightness(0) invert(1);">
                    <p>Fábrica mineira especializada em cabrestos e selaria premium.</p>
                </div>
                <div class="footer-section">
                    <h3>Links Úteis</h3>
                    <a href="index.html">Home</a>
                    <a href="loja.html">Loja</a>
                    <a href="contato.html">Contato</a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
