<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto - Minas Country</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt="Minas Country"></a>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="loja.html" style="color: var(--color-secondary);">Loja</a>
                <a href="contato.html">Contato</a>
            </nav>
        </div>
    </header>

    <div class="container mt-5 mb-5" style="min-height: 50vh;">
        <div id="produto-detalhe" style="display: flex; flex-wrap: wrap; gap: 40px; background: #fff; padding: 30px; border-radius: 8px; box-shadow: var(--shadow-card);">
            <div style="flex: 1; min-width: 300px;">
                <img id="prod-img" src="" alt="Produto" style="width: 100%; border-radius: 8px; border: 1px solid #eee;">
            </div>
            <div style="flex: 1; min-width: 300px; display: flex; flex-direction: column;">
                <h1 id="prod-nome" style="font-size: 2.2rem; margin-bottom: 10px;">Carregando...</h1>
                <div id="prod-preco" style="font-size: 2rem; color: var(--color-primary); font-weight: 600; margin-bottom: 20px;">R$ 0,00</div>
                <h3 style="margin-bottom: 10px; color: #333;">Descrição</h3>
                <p id="prod-desc" style="color: #666; margin-bottom: 30px; line-height: 1.8;">...</p>
                <a id="btn-comprar" href="#" target="_blank" class="btn" style="margin-top: auto; text-align: center; font-size: 1.2rem; padding: 15px;">Comprar pelo WhatsApp</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <img src="images/logo.png" alt="Logo" style="height: 50px; margin-bottom: 20px; filter: brightness(0) invert(1);">
                    <p>Fábrica mineira especializada em cabrestos e selaria premium.</p>
                </div>
                <div class="footer-section">
                    <h3>Links Úteis</h3>
                    <a href="index.html">Home</a>
                    <a href="loja.html">Loja</a>
                    <a href="contato.html">Contato</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
